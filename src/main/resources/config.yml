#This Plugin is from EliVB

#This is a Plugin like DonutSMP Order, you can change all of the messages.
#For more Premium Skripts or Plugins join our Discord: "https://discord.gg/V3fcWZrccj"

#permissions
#order.use - Allows players to use /order command
#order.admin - Allows admin commands like /order reload
#order.limit.1-44 - Allows players to create a certain amount of orders

#Plugin Placeholders
#none

#The main command Order will always be registered
command-aliases:
  - orders

#price settings for orders, you can set a minimum and maximum price per item, -1 means no limit
minimum-price-per-item: 1
maximum-price-per-item: -1

#amount settings for orders, you can set a minimum and maximum amount of items per order, -1 means no limit
minimum-item-per-order: 1
maximum-item-per-order: -1

#Enable or disable order announcements in chat (broadcasted when a new order is created)
announce-orders: true
announce-message: '&#00fc88Orders &7» &a%owner% &7 has created an order for &6%requested-amount% %requested-material%&7 at &#00fc88%price%&7 each!'

#If you set this to true the name and lore of the item you deliver will be ignored when checking if the delivered item is correct,
#only the material and amount will be checked. This can be useful if you want to use items with custom names and lores for delivering orders.
delivering-check-ignore-lore: true

#Order expiration and deletion settings, you can set the time in seconds, after the order will be expired and deleted.
#Expired orders cannot be delivered anymore but can be collected by the owner until they are deleted.
expire-time-seconds: 604800 # Order expiration time (in seconds)
deletion-time-seconds: 604800 # Order deletion time after expiration (in seconds)

economy:
  provider: VAULT
  currency-format: "#,##0.##"
  abbreviations:
    enabled: true #Accept 100k, 10k, 1m, etc... in the sign of price.
    formats:
      - 'K'
      - 'M'
      - 'B'
      - 'T'

source-item:
  material: "%material_selected_item%"
  name: '&#00fc88%owner%s Order'
  lore:
    - '&#00fc88%requested-amount% &f%requested-material%'
    - '&#00fc88%price% &feach'
    - ''
    - '&#80802a%delivered-amount%/&#008f4d%required-amount% &7Delivered'
    - '&#80802a%paid-amount%/&#008f4d%total-paid-amount% &7Paid'
    - ''
    - '&fClick to deliver &#00fc88%owner% &f%requested-material%'
    - '&8%expire-time% Until Order expires'

sounds:
  gui-click:
    enabled: true
    sound: UI_BUTTON_CLICK
  refresh-gui:
    enabled: true
    sound: UI_TOAST_IN
  error:
    enabled: true
    sound: ENTITY_VILLAGER_NO
